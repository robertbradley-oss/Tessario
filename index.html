<!doctype html>
<!-- Tessario static app shell: sidebar, top bar, ticket workspace, and modal container. -->
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tessario</title>
    <link rel="icon" href="./assets/tessario-mark.svg">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body class="queue-screen table-view-active metrics-collapsed filters-collapsed">
    <div class="app-shell">
      <aside class="sidebar" aria-label="Primary navigation">
        <div class="brand">
          <span class="logo-badge" aria-hidden="true">
            <img src="./assets/tessario-mark.svg" alt="" onerror="this.hidden=true; this.nextElementSibling.hidden=false">
            <span hidden>T</span>
          </span>
          <div class="brand-copy">
            <strong>Tessario</strong>
            <span id="brandTagline">Ticketing made clear</span>
          </div>
        </div>

        <nav class="nav-list sidebar-main-nav" aria-label="Main navigation">
          <span class="sidebar-nav-indicator motion-tab-indicator" aria-hidden="true"></span>
          <button class="nav-item" id="dashboardNavButton" type="button" title="Dashboard" aria-label="Dashboard" data-tooltip="Dashboard">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="6.5" height="6.5" rx="1.6"></rect><rect x="13.5" y="4" width="6.5" height="6.5" rx="1.6"></rect><rect x="4" y="13.5" width="6.5" height="6.5" rx="1.6"></rect><rect x="13.5" y="13.5" width="6.5" height="6.5" rx="1.6"></rect></svg></span>
            <span class="nav-label">Dashboard</span>
          </button>
          <div class="tickets-nav-row">
            <button class="nav-item" id="ticketsNavButton" type="button" title="Tickets" aria-label="Tickets" data-tooltip="Tickets">
              <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M5 7.25A2.25 2.25 0 0 1 7.25 5h9.5A2.25 2.25 0 0 1 19 7.25v9.5A2.25 2.25 0 0 1 16.75 19h-9.5A2.25 2.25 0 0 1 5 16.75v-9.5Z"></path><path d="M8 9h8"></path><path d="M8 12h8"></path><path d="M8 15h5.5"></path><path d="M9.5 3.75h5"></path></svg></span>
              <span class="nav-label">Tickets</span>
              <strong class="nav-badge" id="ticketNavCount">0</strong>
            </button>
          </div>
          <button class="nav-item admin-only" id="adminNavButton" type="button" title="Admin" aria-label="Admin" data-tooltip="Admin">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 3.75 19 6.4v5.35c0 4.2-2.72 7.25-7 8.5-4.28-1.25-7-4.3-7-8.5V6.4l7-2.65Z"></path><path d="M12 11.25a2.35 2.35 0 1 0 0-4.7 2.35 2.35 0 0 0 0 4.7Z"></path><path d="M8.15 16.55c.72-1.45 2.05-2.25 3.85-2.25s3.13.8 3.85 2.25"></path></svg></span>
            <span class="nav-label">Admin</span>
          </button>
          <button class="nav-item" id="settingsNavButton" type="button" title="Settings" aria-label="Settings" data-tooltip="Settings">
            <span class="nav-icon" aria-hidden="true"><svg viewBox="0 0 24 24"><path d="M12 15.25a3.25 3.25 0 1 0 0-6.5 3.25 3.25 0 0 0 0 6.5Z"></path><path d="M18.4 13.2c.08-.4.12-.8.12-1.2s-.04-.8-.12-1.2l2.05-1.55-1.95-3.38-2.38.96a7.24 7.24 0 0 0-2.08-1.2L13.68 3h-3.36l-.36 2.63c-.76.28-1.46.69-2.08 1.2L5.5 5.87 3.55 9.25 5.6 10.8c-.08.4-.12.8-.12 1.2s.04.8.12 1.2l-2.05 1.55 1.95 3.38 2.38-.96c.62.51 1.32.92 2.08 1.2l.36 2.63h3.36l.36-2.63c.76-.28 1.46-.69 2.08-1.2l2.38.96 1.95-3.38-2.05-1.55Z"></path></svg></span>
            <span class="nav-label">Settings</span>
          </button>
        </nav>
        <nav class="nav-list" id="viewNav" aria-label="Ticket views" hidden></nav>

        <div class="sidebar-footer">
          <div class="workspace-switcher" title="Workspace: iSpring">
            <span class="workspace-logo" aria-hidden="true">
              <img src="./assets/ispring-logo.png" alt="" onerror="this.hidden=true; this.nextElementSibling.hidden=false">
              <span hidden>iS</span>
            </span>
            <div>
              <small>Workspace</small>
              <strong id="sidebarWorkspaceLabel">iSpring</strong>
            </div>
          </div>
          <button class="sidebar-collapse-button" id="toggleSidebarButton" type="button" title="Collapse sidebar" aria-label="Collapse sidebar" aria-expanded="true">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="4" y="5" width="16" height="14" rx="2"></rect><path d="M9 5v14"></path><path d="m15 9-3 3 3 3"></path></svg>
          </button>
        </div>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="topbar-title">
            <div class="topbar-brand-lockup">
              <img class="topbar-workspace-logo" src="./assets/ispring-logo.png" alt="iSpring" onerror="this.hidden=true; this.nextElementSibling.hidden=false">
              <strong class="topbar-workspace-fallback" hidden>iSpring</strong>
              <small id="topbarWorkspaceLabel">Workspace</small>
            </div>
          </div>

          <label class="global-search">
            <span aria-hidden="true">Search</span>
            <input id="globalSearch" type="search" placeholder="Search tickets, customers, models, orders, notes" spellcheck="false" data-gramm="false" data-gramm_editor="false" data-enable-grammarly="false">
            <kbd>/</kbd>
          </label>

          <div class="topbar-actions">
            <button class="secondary-button topbar-action-button assist-launch-button admin-only" id="tessarioAssistButton" type="button" title="Tessario Assist" aria-label="Open Tessario Assist">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3.8 10.1 9 5 10.9l5.1 1.9L12 18l1.9-5.2 5.1-1.9L13.9 9 12 3.8Z"></path><path d="M5.7 15.4 5 17.3l-1.9.7 1.9.7.7 1.9.7-1.9 1.9-.7-1.9-.7-.7-1.9Z"></path><path d="m18 16 .8 2.1 2.1.8-2.1.8-.8 2.1-.8-2.1-2.1-.8 2.1-.8L18 16Z"></path></svg>
              <span>Assist</span>
            </button>
            <button class="primary-button topbar-action-button new-ticket-button" id="newTicketButton" type="button" title="New Ticket" aria-label="New Ticket">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14"></path><path d="M5 12h14"></path></svg>
              <span>New</span>
            </button>
            <div class="notification-center">
              <button class="notification-bell" id="notificationBellButton" type="button" title="Notifications" aria-label="Open notifications" aria-expanded="false">
                <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9Z"></path><path d="M13.7 21a2 2 0 0 1-3.4 0"></path></svg>
                <span class="notification-count" id="notificationUnreadCount" hidden>0</span>
              </button>
              <section class="notification-panel" id="notificationPanel" aria-label="Notifications" hidden></section>
            </div>
            <button class="user-profile" id="profileButton" type="button" title="Profile and settings" aria-label="Open profile settings">
              <span id="profileInitials">RB</span>
              <div>
                <strong id="profileButtonName">CS14 Robert</strong>
                <small id="profileButtonRole">Admin</small>
              </div>
            </button>
          </div>
        </header>

        <section class="ticket-workspace">
          <aside class="queue-panel" aria-label="Ticket queue">
            <div class="panel-header">
              <div>
                <p class="eyebrow">Queue</p>
                <h1 id="queueTitle">Open Tickets</h1>
              </div>
              <div class="queue-header-actions"></div>
            </div>

            <div class="queue-controls">
              <label class="queue-search">
                <span>Queue search</span>
                <input id="queueSearch" type="search" placeholder="Ticket, customer, email, model, order, rep, issue" spellcheck="false" data-gramm="false" data-gramm_editor="false" data-enable-grammarly="false">
              </label>
              <div class="ticket-action-toolbar" id="ticketActionToolbar" aria-label="Ticket actions">
                <div class="bulk-actions" id="bulkActions" aria-live="polite"></div>
                <div class="toolbar-action-group">
                  <label class="toolbar-select">
                    <span>Status</span>
                    <select id="statusFilter" aria-label="Status action"></select>
                  </label>
                  <label class="toolbar-select">
                    <span>Assign</span>
                    <select id="assignSelect" aria-label="Assignment action"></select>
                  </label>
                  <button class="toolbar-icon-button merge-toolbar-button" id="mergeTicketsButton" type="button" title="Merge tickets" aria-label="Merge tickets" disabled>
                    <svg class="toolbar-button-icon merge-button-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M6 7.25h3.1c1.6 0 2.72.62 3.7 2.05l1.7 2.48c.92 1.34 1.98 1.97 3.52 1.97H19"></path>
                      <path d="M6 16.75h3.1c1.6 0 2.72-.62 3.7-2.05l1.7-2.48c.92-1.34 1.98-1.97 3.52-1.97H19"></path>
                      <path d="m16.6 7.85 2.4 2.4-2.4 2.4"></path>
                      <path d="m16.6 11.35 2.4 2.4-2.4 2.4"></path>
                      <circle cx="6" cy="7.25" r="1.05"></circle>
                      <circle cx="6" cy="16.75" r="1.05"></circle>
                    </svg>
                    <span>Merge</span>
                  </button>
                  <button class="toolbar-icon-button" id="queueCopyLinkButton" type="button" title="Copy ticket link" aria-label="Copy ticket link">
                    <svg class="toolbar-button-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M9.75 14.25 14.25 9.75"></path>
                      <path d="M11 6.75 12.25 5.5a4.2 4.2 0 0 1 5.94 5.94l-1.25 1.25"></path>
                      <path d="M13 17.25 11.75 18.5a4.2 4.2 0 0 1-5.94-5.94l1.25-1.25"></path>
                    </svg>
                    <span>Link</span>
                  </button>
                  <button class="toolbar-icon-button" id="refreshQueueButton" type="button" title="Refresh queue" aria-label="Refresh queue">
                    <svg class="toolbar-button-icon" viewBox="0 0 24 24" aria-hidden="true">
                      <path d="M20 12a8 8 0 0 1-13.66 5.66"></path>
                      <path d="M4 12A8 8 0 0 1 17.66 6.34"></path>
                      <path d="M17.75 3.75v3h-3"></path>
                      <path d="M6.25 20.25v-3h3"></path>
                    </svg>
                    <span>Refresh</span>
                  </button>
                  <label class="toolbar-select toolbar-sort-select">
                    <span>Sort</span>
                    <select id="sortSelect" aria-label="Sort tickets">
                    <option value="newest">Newest</option>
                    <option value="oldest">Oldest</option>
                    <option value="sla">SLA risk</option>
                    </select>
                  </label>
                  <button class="toolbar-icon-button reset-filter-button" id="quickResetFiltersButton" type="button">Reset</button>
                </div>
              </div>
            </div>

            <div class="queue-view-tabs" id="queueViewTabs" aria-label="Queue views"></div>

            <div class="ticket-list" id="ticketList" aria-live="polite"></div>
          </aside>

          <aside class="queue-preview" id="queuePreview" aria-label="Selected ticket preview"></aside>

          <section class="conversation-panel" id="conversationPanel" aria-label="Selected ticket conversation"></section>

          <aside class="context-panel" id="contextPanel" aria-label="Ticket context"></aside>

          <section class="admin-panel" id="adminPanel" aria-label="Admin assignment settings"></section>
          <section class="knowledge-panel" id="knowledgePanel" aria-label="Tessario Knowledge Vault"></section>
          <section class="dashboard-panel" id="dashboardPanel" aria-label="Tessario Dashboard"></section>
        </section>

        <footer class="app-footer" aria-label="Copyright">
          Copyright © 2026 Tessario, LLC. All Rights Reserved.
        </footer>
      </main>
    </div>

    <dialog class="modal motion-modal-open" id="ticketModal" hidden></dialog>
    <dialog class="modal history-modal motion-modal-open" id="customerHistoryModal" hidden></dialog>
    <dialog class="modal confirmation-modal motion-modal-open" id="workflowConfirmModal" hidden></dialog>
    <dialog class="modal profile-modal motion-modal-open" id="profileModal" hidden></dialog>
    <dialog class="modal knowledge-file-modal motion-modal-open" id="knowledgeFileModal" hidden></dialog>
    <aside class="assist-drawer motion-drawer-open" id="assistDrawer" aria-label="Tessario AI assistant" aria-hidden="true"></aside>
    <div class="toast motion-fade-in" id="toast" role="status" aria-live="polite" hidden></div>

    <script src="./app.js"></script>
  </body>
</html>
